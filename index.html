<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1a237e">
  <title>Characters Walkthrough Queue</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; min-height: 100vh; }

    header { background: #1a237e; color: white; padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
    header h1 { font-size: 1.2rem; font-weight: 600; }
    .subtitle { font-size: 0.75rem; opacity: 0.8; }
    .admin-btn { background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.4); color: white; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 0.8rem; }
    .admin-btn:hover { background: rgba(255,255,255,0.3); }
    .admin-badge { background: #f57c00; color: white; font-size: 0.7rem; padding: 2px 8px; border-radius: 10px; margin-left: 8px; }

    main { max-width: 600px; margin: 0 auto; padding: 16px; }

    .signup-btn { display: block; width: 100%; background: #1a237e; color: white; border: none; padding: 16px; border-radius: 12px; font-size: 1rem; font-weight: 600; cursor: pointer; margin-bottom: 20px; }
    .signup-btn:hover { background: #283593; }

    .section-title { font-size: 0.85rem; font-weight: 600; color: #666; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
    .queue-count { background: #1a237e; color: white; border-radius: 12px; padding: 2px 8px; font-size: 0.75rem; }

    .queue-empty { text-align: center; padding: 40px 20px; color: #999; background: white; border-radius: 12px; }
    .queue-empty .emoji { font-size: 2rem; margin-bottom: 8px; }

    .queue-item { background: white; border-radius: 12px; padding: 16px; margin-bottom: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); border-left: 4px solid #1a237e; }
    .queue-item.on-deck { border-left-color: #f57c00; background: #fff8f0; }

    .item-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
    .item-position { font-size: 0.75rem; color: #999; font-weight: 600; }
    .item-status { font-size: 0.7rem; font-weight: 700; padding: 3px 8px; border-radius: 10px; text-transform: uppercase; }
    .status-waiting { background: #e3f2fd; color: #1565c0; }
    .status-on-deck { background: #fff3e0; color: #e65100; }

    .item-name { font-size: 1.1rem; font-weight: 700; color: #1a1a2e; }
    .item-character { font-size: 0.9rem; color: #1a237e; font-weight: 600; margin-bottom: 6px; }
    .item-details { font-size: 0.8rem; color: #666; line-height: 1.6; }
    .item-detail { display: flex; gap: 6px; }
    .detail-label { font-weight: 600; color: #444; min-width: 70px; }

    .item-actions { margin-top: 12px; display: flex; gap: 8px; }
    .btn-done { background: #2e7d32; color: white; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 0.85rem; flex: 1; }
    .btn-done:hover { background: #1b5e20; }
    .btn-remove { background: #c62828; color: white; border: none; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 0.85rem; }
    .btn-remove:hover { background: #b71c1c; }

    .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 200; overflow-y: auto; padding: 20px; }
    .modal-overlay.active { display: flex; align-items: flex-start; justify-content: center; }
    .modal { background: white; border-radius: 16px; padding: 24px; width: 100%; max-width: 500px; margin: auto; }
    .modal h2 { font-size: 1.2rem; margin-bottom: 20px; color: #1a237e; }

    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 0.85rem; font-weight: 600; color: #444; margin-bottom: 6px; }
    .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 10px 12px; border: 1.5px solid #ddd; border-radius: 8px; font-size: 0.95rem; font-family: inherit; }
    .form-group input:focus, .form-group textarea:focus, .form-group select:focus { outline: none; border-color: #1a237e; }
    .form-group textarea { resize: vertical; min-height: 70px; }
    .form-hint { font-size: 0.75rem; color: #999; margin-top: 4px; }

    .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
    .btn-submit { flex: 1; background: #1a237e; color: white; border: none; padding: 12px; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
    .btn-submit:hover { background: #283593; }
    .btn-submit:disabled { background: #ccc; cursor: not-allowed; }
    .btn-cancel { background: #f0f0f0; color: #444; border: none; padding: 12px 20px; border-radius: 8px; font-size: 1rem; cursor: pointer; }

    .pass-modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 300; align-items: center; justify-content: center; }
    .pass-modal.active { display: flex; }
    .pass-box { background: white; border-radius: 16px; padding: 24px; width: 90%; max-width: 320px; text-align: center; }
    .pass-box h3 { margin-bottom: 16px; color: #1a237e; }
    .pass-box input { width: 100%; padding: 10px; border: 1.5px solid #ddd; border-radius: 8px; font-size: 1.2rem; text-align: center; letter-spacing: 4px; margin-bottom: 12px; }
    .pass-error { color: #c62828; font-size: 0.85rem; margin-bottom: 8px; display: none; }

    .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1a237e; color: white; padding: 12px 24px; border-radius: 24px; font-size: 0.9rem; z-index: 400; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; }
    .toast.show { opacity: 1; }

    .loading { text-align: center; padding: 30px; color: #999; }

    @media (max-width: 480px) {
      header h1 { font-size: 1rem; }
      main { padding: 12px; }
    }
  </style>
</head>
<body>

<header>
  <div>
    <div class="subtitle">Characters Department</div>
    <h1>Walkthrough Queue <span id="adminBadge" class="admin-badge" style="display:none">ADMIN</span></h1>
  </div>
  <button class="admin-btn" onclick="handleAdminBtn()">&#9881; Admin</button>
</header>

<main>
  <button class="signup-btn" onclick="openSignupModal()">+ Sign Up for Review</button>

  <div class="section-title">
    Current Queue
    <span class="queue-count" id="queueCount">0</span>
  </div>

  <div id="queueContainer">
    <div class="loading">Loading queue...</div>
  </div>
</main>

<!-- Sign Up Modal -->
<div class="modal-overlay" id="signupModal">
  <div class="modal">
    <h2>Sign Up for Review</h2>
    <div class="form-group">
      <label>Your Name *</label>
      <input type="text" id="f_name" placeholder="First Last">
    </div>
    <div class="form-group">
      <label>Character *</label>
      <input type="text" id="f_character" placeholder="Character name">
    </div>
    <div class="form-group">
      <label>Specifics</label>
      <textarea id="f_specifics" placeholder="What specifically do you want reviewed? (e.g. facial rig, body sim...)"></textarea>
    </div>
    <div class="form-group">
      <label>Buddies</label>
      <input type="text" id="f_buddies" placeholder="Other impacted artists (comma separated)">
      <div class="form-hint">Other artists who should be present or are impacted</div>
    </div>
    <div class="form-group">
      <label>Office / Location</label>
      <input type="text" id="f_office" placeholder="e.g. B114, Remote">
    </div>
    <div class="form-group">
      <label>Estimated Time Needed</label>
      <select id="f_time">
        <option value="">Select...</option>
        <option value="5 min">5 minutes</option>
        <option value="10 min">10 minutes</option>
        <option value="15 min">15 minutes</option>
        <option value="20 min">20 minutes</option>
        <option value="30 min">30 minutes</option>
        <option value="45 min">45 minutes</option>
        <option value="1 hour">1 hour</option>
      </select>
    </div>
    <div class="form-group">
      <label>Slack Handle</label>
      <input type="text" id="f_slack" placeholder="your-slack-username (no @)">
      <div class="form-hint">Used to ping you when you're on deck</div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeSignupModal()">Cancel</button>
      <button class="btn-submit" id="submitBtn" onclick="submitSignup()">Join Queue</button>
    </div>
  </div>
</div>

<!-- Admin Password Modal -->
<div class="pass-modal" id="passModal">
  <div class="pass-box">
    <h3>&#128274; Admin Access</h3>
    <input type="password" id="passInput" placeholder="PIN" onkeydown="if(event.key==='Enter')checkPass()">
    <div class="pass-error" id="passError">Incorrect PIN. Try again.</div>
    <button class="btn-submit" onclick="checkPass()">Enter</button>
    <br><br>
    <button class="btn-cancel" onclick="closePassModal()" style="width:100%">Cancel</button>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  const SCRIPT_URL = 'https://script.google.com/a/macros/pixar.com/s/AKfycbybZPmAxO25Znm2hkRs2VmywzBzt4E2wEhs5ldbyjioV2EFVYQB8Cs9RzcOF5kgoK1hgg/exec';
  const ADMIN_PIN = '1234';
  let isAdmin = false;
  let currentQueue = [];

  async function loadQueue() {
    try {
      const res = await fetch(SCRIPT_URL + '?action=getQueue');
      const data = await res.json();
      currentQueue = data.queue || [];
      renderQueue();
    } catch(e) {
      document.getElementById('queueContainer').innerHTML = '<div class="loading">Error loading queue. Please refresh.</div>';
    }
  }

  function renderQueue() {
    const container = document.getElementById('queueContainer');
    document.getElementById('queueCount').textContent = currentQueue.length;

    if (currentQueue.length === 0) {
      container.innerHTML = '<div class="queue-empty"><div class="emoji">&#127916;</div><div>Queue is empty</div><div style="font-size:0.8rem;margin-top:6px">Be the first to sign up!</div></div>';
      return;
    }

    container.innerHTML = currentQueue.map((item, i) => {
      const status = item.Status || 'Waiting';
      const statusClass = status.toLowerCase().replace(' ', '-');
      const adminActions = isAdmin ? `
        <div class="item-actions">
          ${i === 0 ? `<button class="btn-done" onclick="markDone('${item.RowID}')">&#10003; Mark Done</button>` : ''}
          <button class="btn-remove" onclick="removeEntry('${item.RowID}')">Remove</button>
        </div>` : '';

      return `
        <div class="queue-item ${statusClass}">
          <div class="item-header">
            <span class="item-position">#${i + 1} in queue</span>
            <span class="item-status status-${statusClass}">${status}</span>
          </div>
          <div class="item-name">${esc(item.Name)}</div>
          <div class="item-character">${esc(item.Character)}</div>
          <div class="item-details">
            ${item.Specifics ? `<div class="item-detail"><span class="detail-label">Specifics:</span>${esc(item.Specifics)}</div>` : ''}
            ${item.Buddies ? `<div class="item-detail"><span class="detail-label">Buddies:</span>${esc(item.Buddies)}</div>` : ''}
            ${item.Office ? `<div class="item-detail"><span class="detail-label">Office:</span>${esc(item.Office)}</div>` : ''}
            ${item.EstimatedTime ? `<div class="item-detail"><span class="detail-label">Time:</span>${esc(item.EstimatedTime)}</div>` : ''}
          </div>
          ${adminActions}
        </div>`;
    }).join('');
  }

  function openSignupModal() { document.getElementById('signupModal').classList.add('active'); }
  function closeSignupModal() { document.getElementById('signupModal').classList.remove('active'); }

  async function submitSignup() {
    const name = document.getElementById('f_name').value.trim();
    const character = document.getElementById('f_character').value.trim();
    if (!name || !character) { showToast('Name and character are required.'); return; }

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = 'Joining...';

    const params = new URLSearchParams({
      action: 'addEntry', name, character,
      specifics: document.getElementById('f_specifics').value.trim(),
      buddies: document.getElementById('f_buddies').value.trim(),
      office: document.getElementById('f_office').value.trim(),
      estimatedTime: document.getElementById('f_time').value,
      slackHandle: document.getElementById('f_slack').value.trim().replace('@','')
    });

    try {
      const res = await fetch(SCRIPT_URL + '?' + params);
      const data = await res.json();
      if (data.success) {
        closeSignupModal();
        clearForm();
        showToast("You've been added to the queue!");
        loadQueue();
      } else {
        showToast('Something went wrong. Try again.');
      }
    } catch(e) {
      showToast('Error connecting. Please try again.');
    }

    btn.disabled = false;
    btn.textContent = 'Join Queue';
  }

  function clearForm() {
    ['f_name','f_character','f_specifics','f_buddies','f_office','f_slack'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('f_time').value = '';
  }

  function handleAdminBtn() {
    if (isAdmin) { isAdmin = false; document.getElementById('adminBadge').style.display='none'; renderQueue(); showToast('Admin mode off'); }
    else openPassModal();
  }
  function openPassModal() { document.getElementById('passModal').classList.add('active'); setTimeout(() => document.getElementById('passInput').focus(), 100); }
  function closePassModal() { document.getElementById('passModal').classList.remove('active'); document.getElementById('passInput').value=''; document.getElementById('passError').style.display='none'; }
  function checkPass() {
    if (document.getElementById('passInput').value === ADMIN_PIN) {
      isAdmin = true; closePassModal();
      document.getElementById('adminBadge').style.display='inline';
      renderQueue(); showToast('Admin mode on');
    } else {
      document.getElementById('passError').style.display='block';
      document.getElementById('passInput').value='';
    }
  }

  async function markDone(rowId) {
    if (!confirm('Mark this review as done?')) return;
    try {
      const res = await fetch(SCRIPT_URL + '?action=markDone&rowId=' + rowId);
      const data = await res.json();
      if (data.success) {
        showToast(data.nextEntry ? data.nextEntry.name + ' is on deck!' : 'Done. Queue is empty.');
        loadQueue();
      }
    } catch(e) { showToast('Error. Please try again.'); }
  }

  async function removeEntry(rowId) {
    if (!confirm('Remove this entry from the queue?')) return;
    try {
      const res = await fetch(SCRIPT_URL + '?action=removeEntry&rowId=' + rowId);
      const data = await res.json();
      if (data.success) { showToast('Entry removed.'); loadQueue(); }
    } catch(e) { showToast('Error. Please try again.'); }
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  function esc(str) {
    return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  loadQueue();
  setInterval(loadQueue, 30000);
</script>
</body>
</html>
